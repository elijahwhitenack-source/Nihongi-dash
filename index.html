<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Nihongo Dash</title>
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icon.svg">
<meta name="theme-color" content="#12121a">
<style>
  :root{
    --bg:#12121a; --panel:#1c1c28; --panel2:#232333; --text:#f5f0e6; --muted:#8d8da0;
    --accent:#e6484f; --accent2:#4fb3e6; --good:#4fe6a0; --bad:#e6484f; --warn:#e6c64f;
    --lock:#3a3a50;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    display:flex; flex-direction:column; min-height:100vh;
    padding-bottom:env(safe-area-inset-bottom);
  }
  header{
    padding:14px 20px 10px; display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid #2a2a3a;
  }
  header h1{font-size:1.05rem; margin:0; letter-spacing:.02em;}
  header h1 span{color:var(--accent);}
  #countdown{font-size:.75rem; color:var(--muted); text-align:right; line-height:1.3;}
  #countdown b{color:var(--warn); font-size:.95rem;}
  main{flex:1; padding:16px; max-width:560px; width:100%; margin:0 auto;}
  nav{display:flex; gap:6px; margin-bottom:14px;}
  nav button{
    flex:1; padding:9px 4px; border-radius:10px; border:1px solid #2a2a3a;
    background:var(--panel); color:var(--muted); font-size:.78rem; cursor:pointer;
  }
  nav button.active{background:var(--accent); color:#fff; border-color:var(--accent);}
  .card{background:var(--panel); border-radius:16px; padding:20px; margin-bottom:14px; border:1px solid #2a2a3a;}

  /* One compact HUD instead of a progress bar plus four stat tiles */
  #hud{background:var(--panel); border-radius:14px; padding:11px 14px; margin-bottom:10px; border:1px solid #2a2a3a;}
  .hud-top{display:flex; justify-content:space-between; align-items:baseline; font-size:.78rem; margin-bottom:7px;}
  #hud-tier{color:var(--text); font-weight:600;}
  .hud-top b{color:var(--muted); font-size:.72rem; font-weight:500;}
  .bar{height:6px; background:#2a2a3a; border-radius:4px; overflow:hidden;}
  .bar > i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--accent),var(--warn)); transition:width .4s;}
  .hud-chips{display:flex; gap:13px; margin-top:8px; font-size:.7rem; color:var(--muted);}
  .hud-chips b{color:var(--accent2);}
  #hud-unlock{margin-top:7px; font-size:.68rem; color:var(--muted); line-height:1.4;}
  #hud-unlock.ready{color:var(--good);}

  /* The verdict banner — the single unambiguous right/wrong signal */
  #verdict{
    width:100%; border-radius:12px; padding:13px; text-align:center; font-size:1rem;
    font-weight:600; display:none; line-height:1.4;
  }
  #verdict.right{background:var(--good); color:#0a2418;}
  #verdict.wrong{background:var(--bad); color:#fff;}
  #verdict small{display:block; font-weight:500; font-size:.8rem; opacity:.85; margin-top:3px;}

  #continue-btn{
    width:100%; padding:14px; border-radius:11px; border:none;
    background:var(--accent2); color:#0a1a22; font-size:.95rem; font-weight:600; cursor:pointer;
  }

  /* Flashcard */
  #flash-wrap{display:flex; flex-direction:column; align-items:center; gap:14px;}
  #flash-card{
    width:100%; min-height:170px; border-radius:18px; background:var(--panel2);
    display:flex; align-items:center; justify-content:center; flex-direction:column;
    cursor:pointer; border:1px solid #303045; padding:20px; text-align:center; position:relative;
  }
  #new-badge{
    position:absolute; top:10px; right:12px; font-size:.6rem; letter-spacing:.08em;
    background:var(--good); color:#0a2418; padding:3px 7px; border-radius:20px; display:none; font-weight:700;
  }
  #flash-front{font-size:2.4rem; font-weight:600; line-height:1.35;}
  #flash-front.phrase{font-size:1.7rem;}
  #flash-sub{font-size:.72rem; color:var(--muted); margin-top:8px; text-transform:uppercase; letter-spacing:.06em;}
  #flash-back{display:none; font-size:1.2rem; color:var(--good); margin-top:12px;}
  #flash-romaji{display:none; font-size:.85rem; color:var(--muted); margin-top:4px;}
  #flash-hint{font-size:.68rem; color:var(--muted); margin-top:14px;}
  #speak-btn{
    position:absolute; top:8px; left:10px; background:none; border:1px solid #303045;
    color:var(--accent2); width:36px; height:36px; border-radius:50%; cursor:pointer;
    font-size:1rem; display:flex; align-items:center; justify-content:center; padding:0;
  }
  #speak-btn:hover{background:var(--panel);}
  #speak-btn:disabled{opacity:.3; cursor:not-allowed;}
  #speak-btn.speaking{border-color:var(--accent2); background:#1b3140;}
  #listen-face{font-size:3.2rem; line-height:1.2;}
  .grade-row{display:flex; gap:7px; width:100%;}
  .grade-row button{flex:1; padding:12px 3px; border-radius:10px; border:none; font-size:.82rem; color:#fff; cursor:pointer;}
  .g-again{background:var(--bad);} .g-hard{background:var(--warn); color:#222;}
  .g-good{background:var(--good); color:#123;} .g-easy{background:var(--accent2); color:#0a1a22;}

  .toggles{display:flex; gap:7px; margin-bottom:12px;}
  .toggles button{
    flex:1; padding:8px 4px; border-radius:9px; border:1px solid #2a2a3a; background:var(--panel);
    color:var(--muted); font-size:.72rem; cursor:pointer;
  }
  .toggles button.active{background:var(--accent2); color:#0a1a22; border-color:var(--accent2);}

  #type-input{
    width:100%; padding:12px; border-radius:10px; border:1px solid #303045; background:var(--panel2);
    color:var(--text); font-size:1rem; margin-top:10px;
  }
  .ok{color:var(--good);} .no{color:var(--bad);}
  .mc-options{display:flex; flex-direction:column; gap:7px; margin-top:10px; width:100%;}
  .mc-options button{
    padding:12px; border-radius:10px; border:1px solid #303045; background:var(--panel2);
    color:var(--text); font-size:.95rem; cursor:pointer; text-align:left;
  }
  .mc-options button.correct{background:var(--good); color:#123; border-color:var(--good);}
  .mc-options button.wrong{background:var(--bad); color:#fff; border-color:var(--bad);}

  h2.section-title{font-size:.85rem; color:var(--muted); margin:18px 0 8px; text-transform:uppercase; letter-spacing:.06em;}
  h2.section-title:first-child{margin-top:0;}
  .item{background:var(--panel); border-radius:13px; padding:14px 16px; margin-bottom:9px; border:1px solid #2a2a3a;}
  .item h3{margin:0 0 5px; color:var(--accent2); font-size:1rem;}
  .item .jp{font-size:1.05rem; margin:4px 0;}
  .item .en{color:var(--muted); font-size:.82rem;}
  .item .ro{color:#6f6f88; font-size:.75rem; font-style:italic;}

  /* Path */
  .tier{border-radius:14px; padding:14px 16px; margin-bottom:10px; border:1px solid #2a2a3a; background:var(--panel);}
  .tier.locked{opacity:.5;}
  .tier.current{border-color:var(--accent);}
  .tier-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:7px;}
  .tier-head h3{margin:0; font-size:.95rem;}
  .tier-head .pct{font-size:.78rem; color:var(--accent2);}
  .tier .desc{font-size:.76rem; color:var(--muted); margin-bottom:9px;}
  .tier .bar{height:5px;}
  .badge{font-size:.6rem; padding:2px 7px; border-radius:20px; letter-spacing:.06em; text-transform:uppercase;}
  .b-locked{background:var(--lock); color:#9a9ab5;}
  .b-open{background:var(--good); color:#0a2418;}
  .b-done{background:var(--accent2); color:#0a1a22;}
  #unlock-btn{
    width:100%; margin-top:10px; padding:11px; border-radius:10px; border:none;
    background:var(--accent); color:#fff; font-size:.85rem; cursor:pointer;
  }
  #unlock-btn:disabled{background:var(--lock); color:#7a7a95; cursor:not-allowed;}

  .note{
    font-size:.72rem; color:var(--muted); background:var(--panel2); border-radius:9px; padding:10px 12px;
    margin-top:14px; border:1px dashed #3a3a50; line-height:1.5;
  }
  .filter-row{display:flex; gap:6px; margin-bottom:12px; flex-wrap:wrap;}
  .filter-row button{
    padding:6px 12px; border-radius:20px; border:1px solid #2a2a3a; background:var(--panel);
    color:var(--muted); font-size:.72rem; cursor:pointer;
  }
  .filter-row button.active{background:var(--accent2); color:#0a1a22; border-color:var(--accent2);}
  footer{text-align:center; padding:12px; font-size:.66rem; color:var(--muted);}
  #install-btn{display:none; margin-top:10px; width:100%; padding:10px; border-radius:10px; border:none; background:var(--accent); color:#fff; font-size:.85rem; cursor:pointer;}
  .done-msg{text-align:center; padding:10px 0;}
  .done-msg .big{font-size:2.2rem;}
</style>
</head>
<body>

<header>
  <h1><span>日</span> Nihongo Dash</h1>
  <div id="countdown">Trip day<br><b id="days-left">--</b> days left</div>
</header>

<main>
  <nav>
    <button data-view="today" class="active">Today</button>
    <button data-view="path">Path</button>
    <button data-view="browse">Browse</button>
    <button data-view="grammar">Grammar</button>
  </nav>

  <!-- ===== TODAY ===== -->
  <section id="view-today">
    <div id="hud">
      <div class="hud-top">
        <span id="hud-tier">Tier 1 · Hiragana</span>
        <b><span id="sess-min">0</span>/30 min</b>
      </div>
      <div class="bar"><i id="sess-fill"></i></div>
      <div class="hud-chips">
        <span>🔥 <b id="stat-streak">0</b></span>
        <span>New <b id="sess-new">0</b>/<b id="sess-quota">12</b></span>
        <span>Due <b id="stat-due">0</b></span>
        <span>Acc <b id="sess-acc">—</b></span>
      </div>
      <div id="hud-unlock">—</div>
    </div>

    <div class="toggles">
      <button id="opt-romaji">Show romaji</button>
      <button id="opt-reviewonly">Review only</button>
    </div>
    <div id="voice-warning" class="note" style="display:none;"></div>

    <div class="card" id="flash-wrap">
      <div id="verdict"></div>
      <div id="flash-card">
        <button id="speak-btn" title="Hear it (J)">🔊</button>
        <div id="new-badge">New</div>
        <div id="flash-front">—</div>
        <div id="flash-sub"></div>
        <div id="flash-back"></div>
        <div id="flash-romaji"></div>
        <div id="flash-hint">Tap card to flip</div>
      </div>
      <div id="mc-area" class="mc-options"></div>
      <div id="type-area" style="display:none; width:100%;">
        <input id="type-input" type="text" placeholder="Type the romaji…" autocomplete="off" autocapitalize="off" spellcheck="false">
      </div>
      <button id="continue-btn" style="display:none;">Got it — continue</button>
      <div class="grade-row" id="grade-row" style="display:none;">
        <button class="g-again" data-g="0">Again</button>
        <button class="g-hard" data-g="1">Hard</button>
        <button class="g-good" data-g="2">Good</button>
        <button class="g-easy" data-g="3">Easy</button>
      </div>
    </div>

    <div id="new-today-list"></div>
  </section>

  <!-- ===== PATH ===== -->
  <section id="view-path" style="display:none;">
    <h2 class="section-title">Your path to Aug 20</h2>
    <div id="tier-list"></div>
    <button id="unlock-btn">Unlock next tier early</button>
    <div class="note" id="path-note"></div>
  </section>

  <!-- ===== BROWSE ===== -->
  <section id="view-browse" style="display:none;">
    <div class="filter-row" id="browse-filters"></div>
    <div id="browse-list"></div>
  </section>

  <!-- ===== GRAMMAR ===== -->
  <section id="view-grammar" style="display:none;">
    <h2 class="section-title">Grammar bites</h2>
    <div id="grammar-list"></div>
  </section>

  <button id="install-btn">Install Nihongo Dash</button>
</main>

<footer>Built for the Aug 20 push. Progress is saved on this device only.</footer>

/* Tier is derived, never written back into your data. */
function tierOf(card){
  if(typeof card.tier === 'number') return card.tier;
  if(/^h\d+$/.test(card.id))  return 1;
  if(/^kt\d+$/.test(card.id)) return 2;
  if(/^[nc]\d+$/.test(card.id)) return 3;
  return 4;
}

/* ==========================================================================
   5. TEXT PARSING — split "私 (watashi)" and "Red (aka)" into parts so the
      prompt can hide the romaji and typing can accept sane answers.
   ========================================================================== */
function splitParen(s){
  const m = String(s).match(/^(.*?)\s*[(（](.*?)[)）]\s*$/);
  return m ? { main:m[1].trim(), paren:m[2].trim() } : { main:String(s).trim(), paren:null };
}
function variants(s){
  return String(s).split(/\s*[\/、]\s*/).map(v => v.trim().toLowerCase()).filter(Boolean);
}

/* Build a normalized study card from any deck entry. */
function toCard(src){
  if(src.__phrase){
    return {
      id: src.id, category:'phrase', tier: src.tier, rule: src.rule,
      prompt: src.jp, romaji: src.ro, answer: src.en,
      accepts: [...variants(src.en.replace(/[.?!]/g,'')), ...variants(src.ro)],
      label: 'phrase'
    };
  }
  const f = splitParen(src.front);
  const b = splitParen(src.back);
  const accepts = [...variants(b.main)];
  if(b.paren) accepts.push(...variants(b.paren));
  if(f.paren) accepts.push(...variants(f.paren));
  return {
    id: src.id, category: src.category, tier: tierOf(src),
    prompt: f.main,
    romaji: f.paren || (src.category === 'kana' ? b.main : null),
    answer: b.main,
    accepts,
    label: src.category === 'kana' ? 'kana' : 'vocab'
  };
}

const boxIntervals = [

  unlockedTier:1, quota:12, session:null, recent:[], seenOrder:[], quotaAdjustedDay:null

function loadState(){

    const raw = localStorage.getItem(STORE_KEY);
    if(raw) return Object.assign({}, DEFAULTS, JSON.parse(raw));
  }catch(e){}
  return JSON.parse(JSON.stringify(DEFAULTS));
}

function cardState(id){
  if(!state.cards[id]) state.cards[id] = { box:0, due:0, seen:false };
  return state.cards[id];
}

const unlockedCards = () => CARDS.filter(c => c.tier <= state.unlockedTier);
const dueCards = () => unlockedCards().filter(c => isSeen(c.id) && cardState(c.id).due <= Date.now());

/* ==========================================================================
   7. DAY / SESSION
   ========================================================================== */
const todayKey = () => { const d=new Date(); return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`; };
const SESSION_TARGET_MS = 30 * 60 * 1000;

function session(){
  if(!state.session || state.session.day !== todayKey()){
    state.session = { day: todayKey(), activeMs:0, reps:0, hits:0, newIds:[] };
    adaptQuota();
  }
  return state.session;
}

function registerStudyToday(){
  const t = todayKey();
  if(state.lastStudyDay === t) return;
  const y = new Date(Date.now() - 86400000);
  const yKey = `${y.getFullYear()}-${y.getMonth()+1}-${y.getDate()}`;
  state.streak = (state.lastStudyDay === yKey) ? state.streak + 1 : 1;
  state.lastStudyDay = t;
}

/* Session clock only advances while the tab is visible and you're interacting. */
let lastInteraction = Date.now();
['click','keydown','touchstart'].forEach(ev =>
  document.addEventListener(ev, () => { lastInteraction = Date.now(); }, {passive:true})
);
setInterval(() => {
  const s = session();
  const idle = Date.now() - lastInteraction > 90000;
  if(!document.hidden && !idle && s.activeMs < SESSION_TARGET_MS * 2){
    s.activeMs += 1000;
    if(s.activeMs % 15000 === 0) saveState();
    renderSession();
  }
}, 1000);

/* ==========================================================================
   8. PROGRESSION — mastery, unlocking, adaptive quota
   ========================================================================== */
function tierCards(t){ return CARDS.filter(c => c.tier === t); }
function tierMastery(t){
  const cs = tierCards(t);
  if(!cs.length) return 1;
  const solid = cs.filter(c => isSeen(c.id) && cardState(c.id).box >= GRADUATED).length;
  return solid / cs.length;
}
const UNLOCK_AT = 0.8;
function canUnlockNext(){
  return state.unlockedTier < MAX_TIER && tierMastery(state.unlockedTier) >= UNLOCK_AT;
}
function autoUnlock(){
  while(canUnlockNext()){ state.unlockedTier++; }
}

/* Recent accuracy drives how much new material you get tomorrow. */
function recentAccuracy(){
  const r = state.recent || [];
  if(r.length < 12) return null;
  return r.reduce((a,b) => a+b, 0) / r.length;
}
/* Runs once when a new day's session opens — never mid-session, or a good
   run would ratchet the quota to the cap within a few minutes. */
function adaptQuota(){
  if(state.quotaAdjustedDay === todayKey()) return;
  state.quotaAdjustedDay = todayKey();
  const acc = recentAccuracy();
  if(acc === null) return;
  if(acc >= 0.85 && state.quota < 24) state.quota += 3;
  else if(acc < 0.65 && state.quota > 5) state.quota -= 3;
}

/* ==========================================================================
   8b. SPEECH — browser TTS. Listening is the channel flashcards can't reach,
       and it's the one you'll lean on hardest in an actual conversation.
   ========================================================================== */
const synth = window.speechSynthesis;
let jaVoice = null;
let voicesReady = false;

function pickJapaneseVoice(){
  if(!synth) return null;
  const voices = synth.getVoices();
  if(!voices.length) return null;
  const ja = voices.filter(v => /^ja(-|_|$)/i.test(v.lang || ''));
  if(!ja.length) return null;
  // Prefer a local voice — remote ones lag and fail offline on the plane.
  return ja.find(v => v.localService) || ja[0];
}

function initVoices(){
  jaVoice = pickJapaneseVoice();
  voicesReady = true;
  const warn = $('voice-warning');
  const btn = $('speak-btn');
  if(!synth){
    btn.disabled = true;
    warn.style.display = 'block';
    warn.textContent = 'This browser has no speech synthesis, so audio and listening drills are unavailable.';
  } else if(!jaVoice){
    btn.disabled = true;
    warn.style.display = 'block';
    warn.textContent = 'No Japanese voice installed, so listening drills are skipped. On macOS add one in System Settings → Accessibility → Spoken Content → System Voice → Manage Voices (Japanese). On iOS: Settings → Accessibility → Spoken Content → Voices.';
  } else {
    btn.disabled = false;
    warn.style.display = 'none';
  }
}

if(synth){
  initVoices();
  // Voice lists populate asynchronously in most browsers.
  synth.addEventListener?.('voiceschanged', initVoices);
  if(synth.onvoiceschanged === null) synth.onvoiceschanged = initVoices;
}

function speak(text){
  if(!synth || !jaVoice || !text) return;
  try{
    synth.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.voice = jaVoice;
    u.lang = jaVoice.lang || 'ja-JP';
    u.rate = 0.7;    // slow enough to pick apart individual sounds
    u.pitch = 1;
    u.volume = 1;    // don't inherit whatever the platform defaults to
    const btn = $('speak-btn');
    u.onstart = () => btn.classList.add('speaking');
    u.onend = u.onerror = () => btn.classList.remove('speaking');
    synth.speak(u);
  }catch(e){ /* never let audio break a review */ }
}

/* Only the Japanese side is ever spoken — never the English answer. */
const speakableOf = (c) => c && c.prompt ? c.prompt : null;

/* ==========================================================================
   8c. AUTOMATIC DIFFICULTY — each card gets harder as it matures, so the
       ramp happens per-card instead of you choosing a mode for everything.

         unseen            -> teach   (shown, not tested)
         box 0-1  fresh    -> mc      (recognise among four)
         box 2-3  familiar -> listen  (audio only, no writing shown)
         box 4+   solid    -> type    (produce it from memory)

       Two guards: without a Japanese voice, listen degrades to mc; and
       typing is only asked for short answers, because typing out
       "kore wa ikura desu ka" on a phone is a test of thumbs, not recall.
   ========================================================================== */
const TYPEABLE_MAX = 14;

function typeableAnswer(c){
  return (c.accepts || []).some(a => a.length > 0 && a.length <= TYPEABLE_MAX);
}

function autoModeFor(c){
  if(!c) return 'mc';
  if(!isSeen(c.id)) return 'teach';
  const box = cardState(c.id).box;
  if(box <= 1) return 'mc';
  if(box <= 3) return (jaVoice && speakableOf(c)) ? 'listen' : 'mc';
  return typeableAnswer(c) ? 'type' : (jaVoice && speakableOf(c) ? 'listen' : 'mc');
}

  const due = dueCards();
  const fresh = newCards();
  const quotaLeft = Math.max(0, state.quota - s.newIds.length);

  const wantNew = !reviewOnly && fresh.length > 0 && quotaLeft > 0 &&
                  (due.length === 0 || repsSinceNew >= 4);

  if(wantNew){
    currentIsNew = true;
    repsSinceNew = 0;
    return fresh[0];
  }
  if(due.length){
    currentIsNew = false;
    repsSinceNew++;
    return due[Math.floor(Math.random() * due.length)];
  }
  if(!reviewOnly && fresh.length && quotaLeft > 0){
    currentIsNew = true;
    repsSinceNew = 0;
    return fresh[0];
  }

  /* Daily goal met but the 30 minutes aren't up: keep drilling the shakiest
     cards you've already met rather than dead-ending the session. */
  const s2 = session();
  if(s2.activeMs < SESSION_TARGET_MS){
    const practice = unlockedCards()
      .filter(c => isSeen(c.id))
      .sort((a,b) => cardState(a.id).box - cardState(b.id).box)
      .slice(0, 25);
    if(practice.length){
      currentIsNew = false;
      isExtraPractice = true;
      return practice[Math.floor(Math.random() * practice.length)];
    }
  }
  return null;
}

/* Distractors come from the same category so choices stay plausible. */
function distractorsFor(card, n){
  const sameKind = CARDS.filter(c => c.id !== card.id && c.category === card.category && c.tier <= state.unlockedTier);
  const pool = (sameKind.length >= n ? sameKind : CARDS.filter(c => c.id !== card.id)).slice();
  const out = [];
  while(out.length < n && pool.length) out.push(pool.splice(Math.floor(Math.random()*pool.length), 1)[0]);
  return out;
}

/* ==========================================================================
   10. RENDERING
   ========================================================================== */
let cardMode = 'mc';      // the mode chosen for the card on screen
let answered = false;     // guards against double-answering during the pause

function renderCard(){
  const back = $('flash-back'), rom = $('flash-romaji'),
        hint = $('flash-hint'), mcArea = $('mc-area'), typeArea = $('type-area');
  back.style.display = 'none'; rom.style.display = 'none';
  $('grade-row').style.display = 'none';
  $('continue-btn').style.display = 'none';
  $('verdict').style.display = 'none';
  $('type-input').value = '';
  mcArea.innerHTML = '';
  answered = false;

  current = pickNext();
  $('new-badge').style.display = current && currentIsNew ? 'block' : 'none';

  if(!current){
    const anyLeft = newCards().length > 0;
    $('flash-front').className = '';
    $('flash-front').innerHTML = `<div class="done-msg"><div class="big">✓</div></div>`;
    $('flash-sub').textContent = reviewOnly ? 'No reviews due' :
      (anyLeft ? `Daily quota done — ${state.quota} new cards absorbed` : 'Everything unlocked is caught up');
    hint.textContent = anyLeft && !reviewOnly ? 'Come back tomorrow, or unlock the next tier in Path.' : '';
    typeArea.style.display = 'none';
    $('speak-btn').style.visibility = 'hidden';
    return;
  }

  const c = current;
  cardMode = forcedMode || autoModeFor(c);
  $('speak-btn').style.visibility = 'visible';
  $('speak-btn').disabled = !jaVoice;
  $('flash-sub').textContent = `${c.label} · tier ${c.tier}` + (isExtraPractice ? ' · extra practice' : '');

  // Listen: the audio is the question, so the writing stays hidden.
  if(cardMode === 'listen'){
    $('flash-front').className = '';
    $('flash-front').innerHTML = '<span id="listen-face">🎧</span>';
  } else {
    $('flash-front').className = c.category === 'phrase' ? 'phrase' : '';
    $('flash-front').textContent = c.prompt;
  }
  if(showRomaji && cardMode !== 'listen' && extraRomaji(c)){
    rom.textContent = extraRomaji(c); rom.style.display = 'block';
  }

  // Teaching a brand-new card: no question, no scoring, just meet it.
  if(cardMode === 'teach'){
    back.textContent = c.answer; back.style.display = 'block';
    const r = extraRomaji(c);
    if(r){ rom.textContent = r; rom.style.display = 'block'; }
    hint.textContent = 'New — read it and say it aloud.';
    typeArea.style.display = 'none';
    $('continue-btn').style.display = 'block';
    return;
  }

  if(cardMode === 'mc' || cardMode === 'listen'){
    typeArea.style.display = 'none';
    hint.textContent = cardMode === 'listen' ? 'Listen, then choose the meaning' : 'Choose the meaning';
    const opts = [c, ...distractorsFor(c, 3)].sort(() => Math.random() - 0.5);
    opts.forEach(o => {
      const b = document.createElement('button');
      b.textContent = o.answer;
      b.onclick = () => answerMc(o.id === c.id, b, mcArea);
      mcArea.appendChild(b);
    });
    // A short beat so the audio doesn't stab the moment the card appears.
    if(cardMode === 'listen') setTimeout(() => { if(current === c) speak(speakableOf(c)); }, 450);
    return;
  }

  if(cardMode === 'type'){
    typeArea.style.display = 'block';
    hint.textContent = 'Type the romaji, then press Enter';
    $('type-input').focus();
    return;
  }

  // recall — the only mode where the app genuinely can't judge you
  typeArea.style.display = 'none';
  hint.textContent = 'Say it out loud, then tap the card to check';
}

/* Kana answers are already romaji — don't print the same string twice. */
function extraRomaji(c){
  if(!c.romaji) return null;
  return c.romaji.toLowerCase() === c.answer.toLowerCase() ? null : c.romaji;
}

/* Reveal the full answer on the card face. */
function showAnswer(){
  if(cardMode === 'listen'){
    $('flash-front').className = current.category === 'phrase' ? 'phrase' : '';
    $('flash-front').textContent = current.prompt;
  }
  $('flash-back').textContent = current.answer;
  $('flash-back').style.display = 'block';
  const r = extraRomaji(current);
  if(r){ $('flash-romaji').textContent = r; $('flash-romaji').style.display = 'block'; }
}

/* One unmistakable verdict, then move on by itself. */
function settle(correct){
  if(answered) return;
  answered = true;
  showAnswer();

  const v = $('verdict');
  v.className = correct ? 'right' : 'wrong';
  v.innerHTML = correct
    ? '✓ Correct'
    : `✗ Not quite<small>${current.prompt} — ${current.answer}</small>`;
  v.style.display = 'block';
  $('flash-hint').textContent = '';

  grade(correct ? 2 : 0, correct ? 700 : 2200);
}

function answerMc(correct, btn, area){
  if(answered) return;
  [...area.children].forEach(b => {
    b.disabled = true;
    if(b === btn) b.classList.add(correct ? 'correct' : 'wrong');
    else if(!correct && b.textContent === current.answer) b.classList.add('correct');
  });
  settle(correct);
}

function checkTyped(){
  if(!current || answered) return;
  const val = $('type-input').value.trim().toLowerCase();
  if(!val) return;
  settle(current.accepts.includes(val));
}

function grade(g, delay = 0){
  if(!current) return;
  const cs = cardState(current.id);
  const s = session();
  const wasNew = !cs.seen;

  if(wasNew){
    cs.seen = true;
    if(!s.newIds.includes(current.id)) s.newIds.push(current.id);
    if(!state.seenOrder.includes(current.id)) state.seenOrder.push(current.id);
  } else {
    s.reps++;
    if(g > 0) s.hits++;
    state.recent.push(g > 0 ? 1 : 0);
    if(state.recent.length > 40) state.recent.shift();
  }

  // Again resets, Hard holds position, Good steps up, Easy skips a step.
  const step = { 0:null, 1:0, 2:1, 3:2 }[g];
  cs.box = (step === null) ? 0 : Math.min(cs.box + step, boxIntervals.length - 1);
  cs.due = Date.now() + boxIntervals[cs.box];

  registerStudyToday();
  autoUnlock();
  saveState();
  renderAll();

  // Pause on the verdict so it registers, then move on unprompted.
  if(delay > 0) setTimeout(renderCard, delay);
  else renderCard();
}

function renderSession(){
  const s = session();
  $('sess-min').textContent = Math.floor(s.activeMs / 60000);
  $('sess-fill').style.width = Math.min(100, (s.activeMs / SESSION_TARGET_MS) * 100) + '%';
  $('sess-new').textContent = s.newIds.length;
  $('sess-quota').textContent = state.quota;
  $('sess-acc').textContent = s.reps >= 5 ? Math.round((s.hits / s.reps) * 100) + '%' : '—';
}

function renderStats(){
  $('stat-streak').textContent = state.streak || 0;
  $('stat-due').textContent = dueCards().length;

  // The "am I good to move on?" line, on the main screen instead of buried.
  const t = state.unlockedTier;
  $('hud-tier').textContent = `Tier ${t} · ${TIERS[t].name}`;
  const pct = Math.round(tierMastery(t) * 100);
  const need = Math.round(UNLOCK_AT * 100);
  const el = $('hud-unlock');
  if(t >= MAX_TIER){
    el.className = pct >= need ? 'ready' : '';
    el.textContent = `${pct}% solid · final tier`;
  } else if(pct >= need){
    el.className = 'ready';
    el.textContent = `${pct}% solid — tier ${t + 1} (${TIERS[t + 1].name}) unlocks now`;
  } else {
    el.className = '';
    el.textContent = `${pct}% solid — ${need}% unlocks tier ${t + 1}, ${TIERS[t + 1].name}`;
  }
}

function renderNewToday(){
  const s = session();
  const wrap = $('new-today-list');
  if(!s.newIds.length){ wrap.innerHTML = ''; return; }
  const rows = s.newIds.map(id => BY_ID[id]).filter(Boolean).map(c =>
    `<div class="item"><div class="jp">${c.prompt}</div><div class="en">${c.answer}</div>${extraRomaji(c) ? `<div class="ro">${extraRomaji(c)}</div>` : ''}</div>`
  ).join('');
  wrap.innerHTML = `<h2 class="section-title">Learned today · ${s.newIds.length}</h2>${rows}`;
}

function renderPath(){
  const list = $('tier-list');
  list.innerHTML = '';
  for(let t = 1; t <= MAX_TIER; t++){
    const unlocked = t <= state.unlockedTier;
    const pct = Math.round(tierMastery(t) * 100);
    const done = pct >= UNLOCK_AT * 100;
    const el = document.createElement('div');
    el.className = 'tier' + (unlocked ? '' : ' locked') + (t === state.unlockedTier ? ' current' : '');
    el.innerHTML = `
      <div class="tier-head">
        <h3>${t}. ${TIERS[t].name}</h3>
        <span class="badge ${!unlocked ? 'b-locked' : done ? 'b-done' : 'b-open'}">
          ${!unlocked ? 'locked' : done ? 'solid' : 'open'}
        </span>
      </div>
      <div class="desc">${TIERS[t].desc}</div>
      <div class="bar"><i style="width:${unlocked ? pct : 0}%"></i></div>
      <div class="desc" style="margin:7px 0 0;">${tierCards(t).length} cards · ${unlocked ? pct + '% solid' : 'locked'}</div>`;
    list.appendChild(el);
  }
  const btn = $('unlock-btn');
  const atMax = state.unlockedTier >= MAX_TIER;
  btn.disabled = atMax;
  btn.textContent = atMax ? 'All tiers unlocked' : `Unlock tier ${state.unlockedTier + 1}: ${TIERS[state.unlockedTier + 1].name}`;
  $('path-note').textContent =
    `A tier unlocks on its own once ${Math.round(UNLOCK_AT*100)}% of the previous tier is solid (box 2+). ` +
    `Moving faster than that? Unlock early — nothing is lost, and reviews from earlier tiers keep coming regardless. ` +
    `Your daily new-card quota is ${state.quota}, tuned automatically from your recent accuracy.`;
}

let browseFilter = 'all';
function renderBrowse(){
  const filters = [
    ['all','All'], ['kana','Kana'], ['vocab','Vocab'], ['phrase','Phrases']
  ];
  $('browse-filters').innerHTML = filters.map(([k,label]) =>
    `<button data-f="${k}" class="${browseFilter===k?'active':''}">${label}</button>`).join('');
  $('browse-filters').querySelectorAll('button').forEach(b =>
    b.onclick = () => { browseFilter = b.dataset.f; renderBrowse(); });

  const items = CARDS.filter(c => browseFilter === 'all' || c.category === browseFilter);
  const byTier = {};
  items.forEach(c => (byTier[c.tier] = byTier[c.tier] || []).push(c));

  $('browse-list').innerHTML = Object.keys(byTier).sort((a,b)=>a-b).map(t => {
    const locked = Number(t) > state.unlockedTier;
    const rows = byTier[t].map(c => {
      const cs = state.cards[c.id];
      const dot = cs && cs.seen ? (cs.box >= 3 ? '🟢' : cs.box >= 2 ? '🟡' : '🔴') : '⚪️';
      return `<div class="item">
        <div class="jp">${dot} ${c.prompt}</div>
        <div class="en">${c.answer}</div>
        ${extraRomaji(c) ? `<div class="ro">${extraRomaji(c)}</div>` : ''}
      </div>`;
    }).join('');
    return `<h2 class="section-title">Tier ${t} · ${TIERS[t].name}${locked ? ' (locked)' : ''}</h2>${rows}`;
  }).join('');
}

function renderGrammar(){
  const list = $('grammar-list');
  if(!GRAMMAR.length){
    list.innerHTML = `<div class="note">No grammar entries in the deck yet.</div>`;
    return;
  }
  list.innerHTML = GRAMMAR.sort((a,b) => tierOf(a) - tierOf(b)).map(g => {
    const linked = PHRASE_TEMPLATES.filter(p => p.rule === g.id);
    const examples = linked.length
      ? `<div class="ro" style="margin-top:8px;">Drilled by ${linked.length} phrase${linked.length>1?'s':''}: ${linked.slice(0,3).map(p=>p.jp).join('、')}${linked.length>3?'…':''}</div>`
      : '';
    const locked = tierOf(g) > state.unlockedTier;
    return `<div class="item" style="${locked ? 'opacity:.5;' : ''}">
      <h3>${g.title} ${locked ? '· locked' : ''}</h3>
      <div class="jp">${g.jp}</div>
      <div class="en">${g.en}</div>
      ${examples}
    </div>`;
  }).join('');
}

function renderAll(){
  renderSession(); renderStats(); renderNewToday();
  renderPath(); renderBrowse(); renderGrammar(); updateCountdown();
}

/* ==========================================================================
   11. WIRING
   ========================================================================== */
function updateCountdown(){
  const diff = Math.ceil((new Date(state.tripDate + 'T00:00:00') - new Date()) / 86400000);
  $('days-left').textContent = diff > 0 ? diff : 0;
}

// Tapping the card only does something in recall mode, where you self-check.
$('flash-card').addEventListener('click', () => {
  if(!current || answered || cardMode !== 'recall') return;
  showAnswer();
  $('flash-hint').textContent = 'Did you get it?';
  $('grade-row').style.display = 'flex';
});

$('grade-row').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-g]');
  if(!b || answered) return;
  answered = true;
  grade(Number(b.dataset.g));
});

$('continue-btn').onclick = () => {
  if(answered) return;
  answered = true;
  grade(2);   // meeting a new card counts as one clean exposure
};

$('type-input').addEventListener('keydown', (e) => { if(e.key === 'Enter') checkTyped(); });

$('speak-btn').onclick = (e) => {
  e.stopPropagation();          // don't reveal the card just to replay audio
  speak(speakableOf(current));
};

// J replays the audio without reaching for the button mid-drill.
document.addEventListener('keydown', (e) => {
  if(e.key === 'j' && document.activeElement !== $('type-input')) speak(speakableOf(current));
});

$('opt-romaji').onclick = () => {
  showRomaji = !showRomaji;
  $('opt-romaji').classList.toggle('active', showRomaji);
  renderCard();
};
$('opt-reviewonly').onclick = () => {
  reviewOnly = !reviewOnly;
  $('opt-reviewonly').classList.toggle('active', reviewOnly);
  renderCard();
};

$('unlock-btn').onclick = () => {
  if(state.unlockedTier < MAX_TIER){
    state.unlockedTier++;
    saveState(); renderAll(); renderCard();
  }
};

document.querySelectorAll('nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['today','path','browse','grammar'].forEach(v =>
      $('view-' + v).style.display = (v === btn.dataset.view) ? 'block' : 'none');
  };
});

/* PWA */
let deferredPrompt;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault(); deferredPrompt = e; $('install-btn').style.display = 'block';
});
$('install-btn').onclick = async () => {
  if(!deferredPrompt) return;
  deferredPrompt.prompt(); await deferredPrompt.userChoice;
  deferredPrompt = null; $('install-btn').style.display = 'none';
};
if('serviceWorker' in navigator){
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
}

/* Boot */
session();
autoUnlock();
renderAll();
renderCard();
saveState();
setInterval(updateCountdown, 60000);
window.addEventListener('beforeunload', saveState);
</script>
</body>
